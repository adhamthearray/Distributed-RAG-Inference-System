events {}

http {
    upstream backend_servers {
        server node1:5000;
        server node2:5000;
        server node3:5000;
    }

    server {
        listen 80;

        location /predict {
            proxy_connect_timeout 300s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
            proxy_pass http://backend_servers;
        }

        location /ask {
            proxy_connect_timeout 900s;
            proxy_send_timeout 900s;
            proxy_read_timeout 900s;
            proxy_pass http://backend_servers;
        }
    }
}
